<div class="container">
  <h2>Login</h2>

  <form [formGroup]="loginForm" (ngSubmit)="onLogin()">

<label>Email</label>
<input formControlName="email" type="email" placeholder="Enter Email" />

<label>Password</label>
<input formControlName="password" type="password" placeholder="Enter Password" />

    <button type="submit">
      Login
    </button>

  </form>
</div>
