<div class="dashboard-page">
	<app-header [title]="'Employees Details'"></app-header>
  
	<div class="dashboard-body">
	  <app-sidebar></app-sidebar>
  
	  <section class="content">
		<div class="content-panel">
  
		  <div class="d-flex justify-content-start align-items-center gap-2 mb-3">
			<label class="mb-0"><strong>Filter by Department:</strong></label>
  
			<select
			  #deptSelect
			  class="form-select w-auto"
			  (change)="filterByDepartment(deptSelect.value)"
			>
			  <option value="ALL">All</option>
  
			  <option
				*ngFor="let dept of departments"
				[value]="dept"
			  >
				{{ dept }}
			  </option>
			</select>
		  </div>  
  
		  <div class="table-wrapper">
			<table
			  mat-table
			  [dataSource]="dataSource"
			  class="table table-hover mb-0 mat-elevation-z0"
			  matSort
			>
  
			  <!-- Sl No -->
			  <ng-container matColumnDef="sl_no">
				<th mat-header-cell *matHeaderCellDef [style.width.px]="columnWidths['sl_no']">
					Sl. No<span class="resize-handle" (mousedown)="startResize($event,'sl_no'); $event.stopPropagation()"></span>
				</th>
				<td mat-cell *matCellDef="let element; let i = index" [style.width.px]="columnWidths['sl_no']">
				  {{ (paginator.pageIndex * paginator.pageSize) + i + 1 }}
				</td>
			  </ng-container>
  
  
			  <!-- Name -->
			  <ng-container matColumnDef="name">
				<th mat-header-cell *matHeaderCellDef [style.width.px]="columnWidths['name']" mat-sort-header>
					Name<span class="resize-handle" (mousedown)="startResize($event,'name'); $event.stopPropagation()"></span>
				</th>
				<td mat-cell *matCellDef="let element" [style.width.px]="columnWidths['name']"
				>
				  {{element.name}}
				</td>
			  </ng-container>
  
  
			  <!-- Designation -->
			  <ng-container matColumnDef="designation">
				<th mat-header-cell *matHeaderCellDef [style.width.px]="columnWidths['designation']">
					Designation<span class="resize-handle" (mousedown)="startResize($event,'designation'); $event.stopPropagation()"></span>
				</th>
				<td mat-cell *matCellDef="let element" [style.width.px]="columnWidths['designation']">
				  {{ element.designation }}
				</td>
			  </ng-container>
  
  
			  <!-- Employee Type -->
			  <ng-container matColumnDef="emp_type">
				<th mat-header-cell *matHeaderCellDef [style.width.px]="columnWidths['emp_type']">
					Employee Type<span class="resize-handle" (mousedown)="startResize($event,'emp_type'); $event.stopPropagation()"></span>
				</th>
				<td mat-cell *matCellDef="let element" [style.width.px]="columnWidths['emp_type']">
				  {{ element.emp_type }}
				</td>
			  </ng-container>
  
  
			  <!-- Gender -->
			  <ng-container matColumnDef="gender">
				<th mat-header-cell *matHeaderCellDef [style.width.px]="columnWidths['gender']">
					Gender<span class="resize-handle" (mousedown)="startResize($event,'gender'); $event.stopPropagation()"></span>
				</th>
				<td mat-cell *matCellDef="let element" [style.width.px]="columnWidths['gender']">
				  {{ element.gender }}
				</td>
			  </ng-container>
  
  
			  <!-- Joining Date -->
			  <ng-container matColumnDef="joining_date">
				<th mat-header-cell *matHeaderCellDef [style.width.px]="columnWidths['joining_date']">
					Joining Date<span class="resize-handle" (mousedown)="startResize($event,'joining_date'); $event.stopPropagation()"></span>
				</th>
				<td mat-cell *matCellDef="let element" [style.width.px]="columnWidths['joining_date']">
				  {{ element.joining_date }}
				</td>
			  </ng-container>
  
  
			  <!-- Phone -->
			  <ng-container matColumnDef="phone">
				<th mat-header-cell *matHeaderCellDef [style.width.px]="columnWidths['phone']">
					Phone<span class="resize-handle" (mousedown)="startResize($event,'phone'); $event.stopPropagation()"></span>
				</th>
				<td mat-cell *matCellDef="let element" [style.width.px]="columnWidths['phone']">
				  {{ element.phone }}
				</td>
			  </ng-container>
  
  
			  <!-- Email -->
			  <ng-container matColumnDef="email">
				<th mat-header-cell *matHeaderCellDef [style.width.px]="columnWidths['email']">
					Email<span class="resize-handle" (mousedown)="startResize($event,'email'); $event.stopPropagation()"></span>
				</th>
				<td mat-cell *matCellDef="let element" [style.width.px]="columnWidths['email']">
				  {{ element.email }}
				</td>
			  </ng-container>
  
  
			  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
			  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
			</table>
			<mat-paginator
				[pageSize]="5"
				[pageSizeOptions]="[5,10,15]"
				showFirstLastButtons
				(page)="onPageChange($event)">
			  </mat-paginator>
		  </div>
  
		</div>
	  </section>
	</div>
  </div>
