<div class="dashboard-page">
    <app-header [title]="'Leave Management'"></app-header>
   
    <div class="dashboard-body">
      <app-sidebar></app-sidebar>
   
      <section class="content">
        <div class="content-panel">
   
          <!-- Apply Leave Form -->
          <div class="card mb-4 p-3">
            <h5 class="mb-3">Apply Leave</h5>
   
            <form [formGroup]="leaveForm" (ngSubmit)="onSubmit()">
              <div class="row g-3">
   
                <div class="col-md-4">
                  <label class="form-label">From Date</label>
                  <input type="date" class="form-control" formControlName="from_date">
                </div>
   
                <div class="col-md-4">
                  <label class="form-label">To Date</label>
                  <input type="date" class="form-control" formControlName="to_date">
                </div>
   
                <div class="col-md-4">
                  <label class="form-label">Reason</label>
                  <input type="text" class="form-control" formControlName="reason">
                </div>
   
                <div class="col-md-12">
                  <button class="btn btn-primary btn-sm mt-2" type="submit">Apply Leave</button>
                </div>
   
              </div>
            </form>
          </div>
   
          <!-- Leave Table -->
          <div class="table-responsive border rounded">
            <table mat-table [dataSource]="dataSource" class="w-100">
   
              <!-- SL NO -->
              <ng-container matColumnDef="slNo">
                <th mat-header-cell *matHeaderCellDef class="text-center">Sl. No</th>
                <td mat-cell *matCellDef="let element; let i = index" class="text-center">
                  {{ i + 1 }}
                </td>
              </ng-container>
   
              <!-- FROM DATE -->
              <ng-container matColumnDef="from_date">
                <th mat-header-cell *matHeaderCellDef class="text-center">From Date</th>
                <td mat-cell *matCellDef="let element" class="text-center">
                  {{ element.from_date | date:'dd-MM-yyyy' }}
                </td>
              </ng-container>
   
              <!-- TO DATE -->
              <ng-container matColumnDef="to_date">
                <th mat-header-cell *matHeaderCellDef class="text-center">To Date</th>
                <td mat-cell *matCellDef="let element" class="text-center">
                  {{ element.to_date | date:'dd-MM-yyyy' }}
                </td>
              </ng-container>
   
              <!-- REASON -->
              <ng-container matColumnDef="reason">
                <th mat-header-cell *matHeaderCellDef class="text-center">Reason</th>
                <td mat-cell *matCellDef="let element" class="text-center">
                  {{ element.reason }}
                </td>
              </ng-container>
   
              <!-- STATUS -->
              <ng-container matColumnDef="status">
                <th mat-header-cell *matHeaderCellDef class="text-center">Status</th>
                <td mat-cell *matCellDef="let element" class="text-center">
                  <span
                    [ngClass]="{
                      'text-warning': element.status === 'PENDING',
                      'text-success': element.status === 'APPROVED',
                      'text-danger': element.status === 'REJECTED'
                    }">
                    {{ element.status }}
                  </span>
                </td>
              </ng-container>
   
         
              <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
              <tr mat-row *matRowDef="let row; columns: displayedColumns;"
                  [ngClass]="{'table-striped-custom': row.id % 2 === 0}">
              </tr>
   
            </table>
          </div>
   
        </div>
      </section>
    </div>
  </div>
