<div class="dashboard-page">
  <app-header [title]="'HR Portal - Leave Requests'"></app-header>

  <div class="dashboard-body">
    <app-sidebar></app-sidebar>

    <section class="content">
      <div class="content-panel">

        <div class="card p-3">
          <h5 class="mb-3">All Leave Requests</h5>

          <div class="table-responsive border rounded">
            <table mat-table [dataSource]="dataSource" class="w-100">

              <!-- SL -->
              <ng-container matColumnDef="slNo">
                <th mat-header-cell *matHeaderCellDef>Sl</th>
                <td mat-cell *matCellDef="let el">{{ el.slNo }}</td>
              </ng-container>

              <!-- EMPLOYEE -->
              <ng-container matColumnDef="emp_id">
                <th mat-header-cell *matHeaderCellDef>Employee ID</th>
                <td mat-cell *matCellDef="let el">{{ el.emp_id }}</td>
              </ng-container>

              <!-- FROM -->
              <ng-container matColumnDef="from_date">
                <th mat-header-cell *matHeaderCellDef>From</th>
                <td mat-cell *matCellDef="let el">
                  {{ el.from_date | date:'dd-MM-yyyy' }}
                </td>
              </ng-container>

              <!-- TO -->
              <ng-container matColumnDef="to_date">
                <th mat-header-cell *matHeaderCellDef>To</th>
                <td mat-cell *matCellDef="let el">
                  {{ el.to_date | date:'dd-MM-yyyy' }}
                </td>
              </ng-container>

              <!-- REASON -->
              <ng-container matColumnDef="reason">
                <th mat-header-cell *matHeaderCellDef>Reason</th>
                <td mat-cell *matCellDef="let el">{{ el.reason }}</td>
              </ng-container>

              <!-- STATUS -->
              <ng-container matColumnDef="status">
                <th mat-header-cell *matHeaderCellDef>Status</th>
                <td mat-cell *matCellDef="let el">
                  <span
                    [ngClass]="{
                      'text-warning': el.status === 'PENDING',
                      'text-success': el.status === 'APPROVED',
                      'text-danger': el.status === 'REJECTED'
                    }">
                    {{ el.status }}
                  </span>
                </td>
              </ng-container>

              <!-- ACTION -->
              <ng-container matColumnDef="action">
                <th mat-header-cell *matHeaderCellDef>Action</th>

                <td mat-cell *matCellDef="let el">

                  <button
                    *ngIf="el.status === 'PENDING'"
                    class="btn btn-success btn-sm me-2"
                    (click)="approveLeave(el.id)">
                    Approve
                  </button>

                  <button
                    *ngIf="el.status === 'PENDING'"
                    class="btn btn-danger btn-sm"
                    (click)="rejectLeave(el.id)">
                    Reject
                  </button>

                </td>
              </ng-container>

              <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
              <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

            </table>
          </div>

        </div>

      </div>
    </section>
  </div>
</div>
