<div class="page-shell auth-page">
  <h1 class="page-title">EMS</h1>  
  <div class="container">
    <ng-container *ngIf="!isRedirecting; else redirectingState">
      <h2>Sign Up</h2>

      <p class="feedback" *ngIf="feedbackMessage">{{ feedbackMessage }}</p>

      <form [formGroup]="signupForm" (ngSubmit)="onSignUp()">
        <label for="signup-email">Email</label>
        <input id="signup-email" formControlName="email" type="email" placeholder="Enter Email" />

        <label for="signup-password">Password</label>
        <input id="signup-password" formControlName="password" type="password" placeholder="Enter Password" />

        <label for="signup-role">Role</label>
        <select id="signup-role" formControlName="role">
          <option value="">Select Role</option>
          <option value="HR">HR</option>
          <option value="ADMIN">ADMIN</option>
          <option value="EMPLOYEE">EMPLOYEE</option>
        </select>

        <button type="submit" [disabled]="isSubmitting || isRedirecting">
          {{ isSubmitting ? 'Signing Up...' : 'Sign Up' }}
        </button>
      </form>
    </ng-container>

    <ng-template #redirectingState>
      <div class="redirecting-state" aria-live="polite">
        <div class="spinner"></div>
        <p>Redirecting to login...</p>
      </div>
    </ng-template>
  </div>
</div>
